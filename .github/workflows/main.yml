name: Build Mod for 1.21.11

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch: 
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Gradle Cache
      uses: actions/gradle-build-action@v3

    - name: Fix Gradlew Execution Permissions
      run: chmod +x ./mod-1.21.10/gradlew

    - name: Run Fabric Mod Compiler
      run: ./gradlew build
      working-directory: ./mod-1.21.10

    - name: Upload Completed Jar File
      uses: actions/upload-artifact@v4
      with:
        name: MultiWorldPositions-1.21.11-Jar
        path: mod-1.21.10/build/libs/*.jar
